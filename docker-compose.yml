version: '3.8'

services:
  sql-lint-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sql-lint-service
    ports:
      - "5000:5000"
    environment:
      - ENABLE_HOT_RELOAD=${ENABLE_HOT_RELOAD:-true}
      - HOT_RELOAD_DEBOUNCE=${HOT_RELOAD_DEBOUNCE:-0.5}
      - PORT=5000
      # 优化参数
      - TIMEOUT_SECONDS=${TIMEOUT_SECONDS:-5}
      - MAX_SQL_SIZE_MB=${MAX_SQL_SIZE_MB:-10}
      - ENABLE_SAMPLING=${ENABLE_SAMPLING:-true}
      - SAMPLING_THRESHOLD_KB=${SAMPLING_THRESHOLD_KB:-100}
      - CACHE_SIZE=${CACHE_SIZE:-100}
    volumes:
      - ./app/rules:/app/app/rules:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - sql-lint-network

  # 可选：添加一个测试容器
  sql-lint-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sql-lint-test
    command: >
      sh -c "sleep 10 && 
             python -m pytest tests/test_set_statements.py tests/test_multiple_statements.py -v &&
             python -m pytest tests/test_rules_integration.py -v"
    environment:
      - ENABLE_HOT_RELOAD=false
    depends_on:
      - sql-lint-service
    networks:
      - sql-lint-network

networks:
  sql-lint-network:
    driver: bridge

volumes:
  logs: